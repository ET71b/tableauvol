<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSFS 2024 - Dispatch Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.43/moment-timezone-with-data.min.js"></script>
    <style>
        /* Nouveau Thème : Aviation Sombre */
        :root {
            --bg-color: #0d1117;          /* Fond principal bleu très très foncé */
            --text-color: #c9d1d9;        /* Texte gris clair */
            --accent-color: #58a6ff;      /* Bleu aérospatial pour les titres/bordures */
            --header-bg: #161b22;         /* Fond des en-têtes */
            --row-alt-bg: #1c2128;        /* Fond des lignes paires */
            --border-color: #30363d;      /* Lignes du tableau */
            --success: #2ea043;           /* Vert pour vols à venir */
            --danger: #f85149;            /* Rouge pour vols expirés */
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 20px; 
        }

        h1 { 
            color: var(--accent-color); 
            border-bottom: 2px solid var(--border-color); 
            padding-bottom: 10px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
            font-size: 0.85em; 
        }

        th, td { 
            border: 1px solid var(--border-color); 
            padding: 8px 10px; 
            text-align: center; 
        }

        th { 
            background-color: var(--header-bg); 
            color: var(--accent-color); 
            position: sticky; 
            top: 0; 
            vertical-align: top;
            font-weight: 600;
        }

        /* Style des filtres intégrés dans les colonnes */
        th select {
            width: 100%;
            margin-top: 8px;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 5px;
            border-radius: 4px;
            font-size: 0.9em;
            cursor: pointer;
        }

        th select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        tr:nth-child(even) { background-color: var(--row-alt-bg); }
        tr:hover { background-color: rgba(88, 166, 255, 0.1); }
        
        .negative-time { color: var(--danger); font-weight: bold; }
        .positive-time { color: var(--success); font-weight: bold; }
        .compagnie-nom { font-weight: bold; color: #fff; }
        
        /* Message d'erreur ou d'état vide */
        #status-message {
            margin-top: 20px;
            font-size: 1.1em;
            color: var(--accent-color);
            text-align: center;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>MSFS 2024 - Flight Dispatch Center</h1>
    <div id="status-message">Chargement des vols en cours...</div>

    <table id="flights-table" style="display: none;">
        <thead>
            <tr>
                <th>Jours</th>
                <th>Cont. Dép<select id="filter-continent-dep"><option value="">Tous</option></select></th>
                <th>Pays Dép<select id="filter-pays-dep"><option value="">Tous</option></select></th>
                <th>Apt Dép<select id="filter-apt-dep"><option value="">Tous</option></select></th>
                <th>OACI Dép</th>
                <th>Compagnie<select id="filter-compagnie"><option value="">Toutes</option></select></th>
                <th>Vol</th>
                <th>Appareil
                    <select id="filter-appareil">
                        <option value="">Tous</option>
                        <option value="A330-300">A330-300</option>
                        <option value="A350-900">A350-900</option>
                        <option value="A350-1000">A350-1000</option>
                        <option value="A320-200">A320-200</option>
                        <option value="A380">A380</option>
                        <option value="B777-300ER">B777-300ER</option>
                        <option value="B777-200ER">B777-200ER</option>
                    </select>
                </th>
                <th>Dép. ZULU</th>
                <th>Temps Vol
                    <select id="filter-temps-vol">
                        <option value="">Tous</option>
                        <option value="<2h">< 2h</option>
                        <option value="2h-4h">2h à 4h</option>
                        <option value="4h-6h">4h à 6h</option>
                        <option value="6h-8h">6h à 8h</option>
                        <option value=">8h">> 8h</option>
                    </select>
                </th>
                <th>Arr. ZULU</th>
                <th>Apt Arr<select id="filter-apt-arr"><option value="">Tous</option></select></th>
                <th>OACI Arr</th>
                <th>Pays Arr<select id="filter-pays-arr"><option value="">Tous</option></select></th>
                <th>Cont. Arr<select id="filter-continent-arr"><option value="">Tous</option></select></th>
                <th>Temps Restant
                    <select id="filter-temps-restant">
                        <option value="">Tous</option>
                        <option value="30m-1h">30m à 1h</option>
                        <option value="1h-2h">1h à 2h</option>
                        <option value=">2h">> 2h</option>
                    </select>
                </th>
                <th>Heure Loc. Dép</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
